# =============================================================================
# secure-server-init.conf — 服务器安全初始化配置
#
# 使用方式:
#   sudo bash secure-server-init.sh --config ./secure-server-init.conf
#
# 不使用配置文件时，脚本默认进入交互式菜单向导。
# =============================================================================

# ── 步骤开关 (true=执行, false=跳过) ──────────────────────────────────────────

SECURE_STEP_00_ENABLED=true    # 系统软件包更新
SECURE_STEP_01_ENABLED=true    # 管理员用户 + sudo
SECURE_STEP_02_ENABLED=true    # SSH 加固
SECURE_STEP_03_ENABLED=true    # fail2ban 防暴力破解
SECURE_STEP_04_ENABLED=true    # 防火墙
SECURE_STEP_05_ENABLED=true    # 自动安全更新

# ── 基础参数 ──────────────────────────────────────────────────────────────────

ADMIN_USER=deploy
SSH_PORT=22
SSH_ALLOW_USERS=""

# ── fail2ban 参数 ────────────────────────────────────────────────────────────

FAIL2BAN_BANTIME=3600
FAIL2BAN_FINDTIME=600
FAIL2BAN_MAXRETRY=3

# ── 防火墙开放端口 (空格分隔的 port/proto) ────────────────────────────────────
# SSH 端口会自动加入白名单，无需在此重复

UFW_PORTS="22/tcp 80/tcp 443/tcp"

# ── 场景示例 ─────────────────────────────────────────────────────────────────
# Web 服务器: UFW_PORTS="22/tcp 80/tcp 443/tcp"
# 纯 SSH:    UFW_PORTS="22/tcp"
# 跳过某步:   SECURE_STEP_01_ENABLED=false
